<!DOCTYPE html>
<html>
  <head>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <title>{% block title %}{% endblock %} - Flask Menu</title>
  </head>

  <body>
    <div class="menu">
      <nav>
        <ul>
          <li><a href="{{ url_for('q1') }}">Questão 1</a></li>
          <li><a href="{{ url_for('q2') }}">Questão 2</a></li>
          <li><a href="{{ url_for('q3') }}">Questão 3</a></li>
          <li><a href="{{ url_for('q4') }}">Questão 4</a></li>
        </ul>
      </nav>
    </div>

    <div class="content">{% block content %}{% endblock %}</div>
  </body>
</html>
